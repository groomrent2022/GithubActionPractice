name: Fourth Workflow

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release VersionNo'
        required: true
  
jobs:
  if-condition:
    runs-on: ubuntu-latest
    env:
      PILOT_BRANCH_NAME: "release/${{ inputs.release_version }}-common-pilot"
    if: ${{ '$github.ref' == 'refs/heads/$PILOT_BRANCH_NAME' }}
    steps:
      - name: Run task for main branch
        run: |
          echo "Running task for the main branch"
          echo $GITHUB_REF
          echo ${{ env.PILOT_BRANCH_NAME }}
          echo $PILOT_BRANCH_NAME

  else-condition:
    runs-on: ubuntu-latest
    steps:
      - name: Run task for non-main branch
        run: |
          if: ${{ '$github.ref' == 'refs/heads/$PILOT_BRANCH_NAME' }}
            echo "If condition is success"
            echo "Status: ${{ '$github.ref' == 'refs/heads/$PILOT_BRANCH_NAME' }}"
          else
            echo "Else condition is success"
            echo "Status: contains('$github.ref', 'refs/heads/$PILOT_BRANCH_NAME')"
          echo "Running task for $PILOT_BRANCH_NAME branch"
